# StormlightPMS Supabase config
project_id = "stormlight-pms"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/*"]
jwt_expiry = 3600
enable_signup = false
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[functions]
verify_jwt = true

[functions.invite-user]
verify_jwt = true

[functions.set-org-suspended]
verify_jwt = true

[functions.set-profile-status]
verify_jwt = true

[functions.run-daily-jobs]
verify_jwt = false

[functions.send-email]
verify_jwt = true

[functions.import-csv]
verify_jwt = true
